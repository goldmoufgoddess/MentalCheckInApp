<!DOCTYPE html>
<html>
<head>
    <title>Love Check-In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Let's Check-In 💕</h1>
        <p class="subtitle">No pressure. Just pick what feels closest.</p>

        <div class="message-card">
            <p id="text">Hey Baby Love...you straight?</p>
        </div>

        <div id="buttons">
            <button onclick="choose('bad')">😔 Rough Day</button>
            <button onclick="choose('school')">📚 School Stress</button>
            <button onclick="choose('overstimulated')">😵 Overstimulated</button>
            <button onclick="choose('comfort')">🤗 Comfort Me</button>
            <button onclick="choose('sad')">😢 Sad</button>
            <button onclick="choose('frustrated')">😡 Frustrated</button>
            <button onclick="choose('lonely')">😞 Lonely</button>
            <button onclick="choose('tired')">😴 Tired</button>
            <button onclick="choose('anxious')">😰 Anxious</button>
            <button onclick="choose('love')">💕 Need Love</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
